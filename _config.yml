# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale: "pt-BR"
site_theme: "navy" # available themes are "default", "air", "dirt", "forest", "mint", "sunrise", "navy", and "contrast"
title: "Leonardo D. Constantin"
title_separator: "-"
name: &name "Leonardo D. Constantin"

description: &description "Professor Substituto no IFSul-PF. Ensino, pesquisa, extensão e programação competitiva." # Update this with a general description of your site, this is the default if not overridden by a page
url: "https://ldconstantin.github.io"
baseurl: ""
repository: "ldconstantin/ldconstantin.github.io"

# Site Author - only configured fields are listed here. Optional profile
# links can be added when there is a public URL or username to publish.
author:
  avatar: "profile.png"
  name: "Leonardo Constantin"
  bio: "Professor Substituto @ IFSul-PF"
  location: "Passo Fundo, RS, Brasil"
  employer: "IFSul - Câmpus Passo Fundo"
  email: "leonardoconstantin@ifsul.edu.br"
  lattes: "http://lattes.cnpq.br/2406882737060045"
  github: "ldconstantin"
  linkedin: leodeliyannis

# Publication Category - The following the list of publication categories and their headings
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site Settings
teaser: # filename of teaser fallback teaser image placed in /images/ for social media previews
breadcrumbs: false # true, false (default)
words_per_minute: 160
future: true
read_more: "disabled" # if enabled, adds "Read more" links to excerpts
talkmap_link: false #change to true to add link to talkmap on talks page
comments:
  provider: # false (default), "disqus", "discourse", "facebook", "staticman", "custom"
  disqus:
    shortname:
  discourse:
    server: # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    appid:
    num_posts: # 5 (default)
    colorscheme: # "light" (default), "dark"
staticman:
  allowedFields: ["name", "email", "url", "message"]
  branch: "gh-pages" # "master", "gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ["name", "email", "message"]
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601" # "iso8601" (default), "timestamp-seconds", "timestamp-milliseconds"
atom_feed:
  hide: false # change to true to hide the RSS feed in the footer
  path: # blank (default) uses feed.xml

# Optional SEO and social-sharing settings can be added here when there are
# real verification tokens, publisher IDs, or public profile URLs to expose.
social: false

# Analytics
analytics:
  provider: false # false (default), "google-analytics-4", "custom"

# Reading Files
include:
  - .well-known
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# These settings control the types of collections used by the template
collections:
  teaching:
    output: true

  research:
    output: true

  extension:
    output: true

  activities:
    output: true

  materials:
    output: true

# These settings control how pages and collections are included in the site
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # Language defaults - Portuguese posts
  - scope:
      path: "_posts/pt"
      type: posts
    values:
      lang: pt

  # Language defaults - English posts
  - scope:
      path: "_posts/en"
      type: posts
    values:
      lang: en

  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # Teaching PT
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: false

  # Publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  # Activities
  - scope:
      path: ""
      type: activities
    values:
      layout: single
      author_profile: true

  # Research
  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: true

  # Extension
  - scope:
      path: ""
      type: extension
    values:
      layout: single
      author_profile: true

  # Language defaults - Portuguese pages
  - scope:
      path: "_pages/pt"
    values:
      lang: pt

  # Language defaults - English pages
  - scope:
      path: "_pages/en"
    values:
      lang: en

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: Etc/UTC # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic hosted pages behavior with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
#  Type
#  - Hosted-pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/

# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
